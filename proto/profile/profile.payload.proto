syntax = "proto3";
package profile;

option go_package = "github.com/siti-nabila/grpc-auth/pb/profile";


message Profile {
    uint64 id = 1;
    uint64 user_id = 2;
    string name = 3;
    string address = 4;
    string phone = 5;
}

message ProfileRequest {
    string name = 1;
    string address = 2;
    string phone = 3;
}

message ProfileResponse {
   Profile profile = 1;
}