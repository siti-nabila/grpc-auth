syntax = "proto3";
package user;
option go_package = "github.com/siti-nabila/grpc-auth/pb/user";

import "profile/profile.payload.proto";
import "paginator/paginator.payload.proto";

import "google/protobuf/timestamp.proto";

message User {
  uint64 id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
  string dob = 5;
  string phone_no = 6;
}

message UserResponse {
  uint64 id = 1;
  string email = 2;
  google.protobuf.Timestamp created_at = 3;
}
message UserData {
  uint64 id = 1;
  string email = 2;
  string fullname = 3;
  string address = 4;
  string phone = 5;
  repeated uint64 role_ids = 6;
  repeated string role_names = 7;
  google.protobuf.Timestamp created_at = 8;
}



message UserDataOld {
  UserResponse user = 1;
  profile.Profile profile = 2;
}
message AuthRequest {
  string email = 1;
  string password = 2;
}

message UserTokenResponse {
  string token = 1;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message CreateUserResponse {
  User user = 1;
}

message GetUserRequest {
  uint64 id = 1;
}

message GetUserResponse {
  User user = 1;
}
message TestRPC {
  string res = 1;
}


message ListUsersRequest {
  paginator.PageQuery query = 1;
  UserFilter filter = 2;
}

message UserListItem {
  int32 id = 1;
  string email = 2;
  string name = 3;
  string address = 4;
  string phone = 5;
}

message ListUsersResponse {
  repeated UserListItem items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
  bool has_next = 6;
  bool has_prev = 7;
  string next_cursor = 8;
}

message UserFilter {
  google.protobuf.Timestamp created_from = 1;
  google.protobuf.Timestamp created_to = 2;
  repeated uint64 role_codes = 3;
  repeated string statuses = 4;
}
